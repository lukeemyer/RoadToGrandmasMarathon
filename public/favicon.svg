<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg   { fill: #11151f; }
    .run  { stroke: #ff8a3d; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    @media (prefers-color-scheme: light) {
      .bg  { fill: #f7f5f0; }
      .run { stroke: #d96617; }
    }
  </style>
  <!-- Background -->
  <rect width="32" height="32" rx="7" class="bg"/>
  <!-- Running figure -->
  <circle cx="22" cy="5.5" r="2.5" class="run" stroke-width="2"/>
  <!-- Torso (leaning forward) -->
  <line x1="21" y1="8" x2="16.5" y2="18" class="run" stroke-width="2.2"/>
  <!-- Arm forward -->
  <line x1="20" y1="11" x2="26.5" y2="8.5" class="run" stroke-width="2"/>
  <!-- Arm back -->
  <line x1="19" y1="12.5" x2="13" y2="16" class="run" stroke-width="2"/>
  <!-- Front leg (swing — knee up, foot forward) -->
  <polyline points="16.5,18 22,22.5 24,17.5" class="run" stroke-width="2.2"/>
  <!-- Back leg (stance — pushing off) -->
  <polyline points="16.5,18 11.5,23.5 9,28.5" class="run" stroke-width="2.2"/>
</svg>
